<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Babai OS v1.1.9</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const BabaiApp = () => {
            const [status, setStatus] = useState("Babai v1.1.9 Ready");
            const [token, setToken] = useState(localStorage.getItem('hf_token') || '');
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const endRef = useRef(null);

            useEffect(() => { endRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages]);

            const askAI = async () => {
                if (!token) return setStatus("TOKEN REQUIS");
                setStatus("📡 CALLING HF...");

                const newHistory = [...messages, { role: "user", content: input }];
                setMessages(newHistory);
                const currentInput = input;
                setInput('');

                try {
                    const response = await fetch("https://api-inference.huggingface.co/v1/chat/completions", {
                        method: "POST",
                        headers: {
                            "Authorization": `Bearer ${token.trim()}`,
                            "Content-Type": "application/json",
                        },
                        body: JSON.stringify({
                            model: "meta-llama/Meta-Llama-3-8B-Instruct",
                            messages: [
                                { role: "system", content: "Tu es Babai, une IA auto-évolutive concise et efficace." },
                                ...newHistory.map(m => ({ role: m.role, content: m.content }))
                            ],
                            max_tokens: 500,
                            stream: false
                        })
                    });

                    const data = await response.json();

                    if (!response.ok) throw new Error(data.error?.message || "Erreur API");

                    const reply = data.choices[0].message.content;
                    setMessages([...newHistory, { role: "assistant", content: reply }]);
                    setStatus("ONLINE");
                } catch (e) {
                    setStatus("API ERROR");
                    setMessages([...newHistory, { role: "assistant", content: "Erreur: " + e.message }]);
                }
            };

            return (
                <div className="flex flex-col h-screen max-w-md mx-auto bg-zinc-950 shadow-2xl border-x border-zinc-900">
                    <header className="p-4 border-b border-zinc-900 flex justify-between items-center">
                        <h1 className="text-xl font-black text-indigo-500 tracking-tighter italic">BABAI OS</h1>
                        <span className="text-[10px] bg-zinc-900 px-2 py-1 rounded text-zinc-500">v1.1.9</span>
                    </header>

                    <div className="flex-1 overflow-y-auto p-4 space-y-4">
                        {messages.map((m, i) => (
                            <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                <div className={`p-3 rounded-2xl text-sm max-w-[85%] ${
                                    m.role === 'user' ? 'bg-indigo-600 text-white' : 'bg-zinc-900 text-zinc-100 border border-zinc-800'
                                } shadow-md`}>
                                    <p className="whitespace-pre-wrap leading-relaxed">{m.content}</p>
                                </div>
                            </div>
                        ))}
                        <div ref={endRef} />
                    </div>

                    <div className="p-4 bg-zinc-900/50 backdrop-blur-md border-t border-zinc-900">
                        <div className="text-[10px] font-mono text-indigo-400 mb-2 font-bold uppercase tracking-widest italic">> {status}</div>
                        <div className="flex gap-2 mb-4 bg-black p-1.5 rounded-xl border border-zinc-800">
                            <input 
                                className="flex-1 bg-transparent p-2 outline-none text-sm placeholder-zinc-700" 
                                value={input} 
                                onChange={(e) => setInput(e.target.value)}
                                onKeyPress={(e) => e.key === 'Enter' && askAI()}
                                placeholder="Message..."
                            />
                            <button onClick={askAI} className="bg-indigo-600 hover:bg-indigo-500 px-5 rounded-lg font-black text-[10px] text-white uppercase italic transition-all">Send</button>
                        </div>
                        <input 
                            type="password" 
                            placeholder="Hugging Face API Key" 
                            value={token} 
                            onChange={(e) => {setToken(e.target.value); localStorage.setItem('hf_token', e.target.value)}} 
                            className="w-full bg-transparent text-[9px] font-mono text-zinc-700 outline-none text-center focus:text-indigo-500 transition-colors" 
                        />
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BabaiApp />);
    </script>
</body>
</html>
