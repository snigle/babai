<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Babai AI v1.1.5</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-slate-300 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const BabaiApp = () => {
            const [status, setStatus] = useState("Système Babai en ligne");
            const [geminiKey, setGeminiKey] = useState(localStorage.getItem('gemini_key') || '');
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');

            const askGemini = async () => {
                if (!geminiKey) { setStatus("MANQUE CLE API"); return; }
                setStatus("Appel Gemini 2.0...");
                
                const userMsg = { role: 'user', parts: [{ text: input }] };
                const newHistory = [...messages, { role: 'user', text: input }];
                setMessages(newHistory);
                
                try {
                    // Endpoint v1beta avec le modèle Flash le plus récent de 2026
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${geminiKey}`;
                    
                    const response = await fetch(url, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ contents: [{ parts: [{ text: input }] }] })
                    });

                    const data = await response.json();
                    
                    if (data.error) {
                        // Tentative de repli (fallback) sur le 1.5 si le 2.0 n'est pas encore sur ton compte
                        setStatus("Erreur 2.0, essai 1.5...");
                        const fallbackUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${geminiKey}`;
                        const res2 = await fetch(fallbackUrl, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ contents: [{ parts: [{ text: input }] }] })
                        });
                        const data2 = await res2.json();
                        if (data2.error) throw new Error(data2.error.message);
                        handleResponse(data2, newHistory);
                    } else {
                        handleResponse(data, newHistory);
                    }
                } catch (e) {
                    setStatus("PANNE : " + e.message);
                }
            };

            const handleResponse = (data, history) => {
                const txt = data?.candidates?.[0]?.content?.parts?.[0]?.text || "Erreur de décodage";
                setMessages([...history, { role: 'model', text: txt }]);
                setInput('');
                setStatus("Prêt");
            };

            return (
                <div className="max-w-md mx-auto h-screen flex flex-col p-4">
                    <div className="flex justify-between border-b border-zinc-800 pb-2 mb-4 text-[10px] font-mono uppercase tracking-widest text-zinc-500">
                        <span>Babai OS</span>
                        <span className="text-emerald-500">v1.1.5-stable</span>
                    </div>

                    <div className="flex-1 overflow-y-auto space-y-4 mb-4 scrollbar-hide">
                        {messages.map((m, i) => (
                            <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                <div className={`p-3 rounded-lg text-sm ${m.role === 'user' ? 'bg-zinc-800' : 'bg-emerald-950/20 border border-emerald-900/30 text-emerald-100'}`}>
                                    {m.text}
                                </div>
                            </div>
                        ))}
                    </div>

                    <div className="bg-zinc-900 p-2 rounded mb-4 text-[9px] font-mono">
                        <span className="text-zinc-600 font-bold">> STATUS:</span> {status}
                    </div>

                    <div className="flex gap-2 mb-4">
                        <input className="flex-1 bg-zinc-900 p-3 rounded outline-none text-sm border border-zinc-800 focus:border-emerald-500" value={input} onChange={(e) => setInput(e.target.value)} onKeyPress={(e) => e.key === 'Enter' && askGemini()} placeholder="Type command..." />
                        <button onClick={askGemini} className="bg-emerald-600 px-4 rounded text-black font-black text-xs uppercase">Run</button>
                    </div>

                    <input type="password" placeholder="Gemini API Key" value={geminiKey} onChange={(e) => {setGeminiKey(e.target.value); localStorage.setItem('gemini_key', e.target.value)}} className="w-full p-2 bg-transparent border border-zinc-900 rounded text-[9px] text-zinc-700 outline-none" />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BabaiApp />);
    </script>
</body>
</html>
