<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Babai OS - Local AI</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="module">
        import * as webllm from "https://esm.run/@mlc-ai/web-llm";
        window.webllm = webllm;
        console.log("WebLLM chargé");
    </script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const BabaiApp = () => {
            const [status, setStatus] = useState("Prêt");
            const [progress, setProgress] = useState(0);
            const [engine, setEngine] = useState(null);
            const [token, setToken] = useState(localStorage.getItem('gh_token') || '');
            const [chatHistory, setChatHistory] = useState([]);
            const [input, setInput] = useState('');

            // Modèle ultra-léger pour Fairphone 4
            const selectedModel = "Gemma-2b-it-q4f16_1-MLC";

            const initAI = async () => {
    if (!window.webllm) {
        setStatus("Erreur: WebLLM n'est pas encore chargé...");
        return;
    }

    setStatus("Configuration du modèle...");
    try {
        // On définit explicitement où trouver Gemma-2b
        const appConfig = {
            model_list: [
                {
                    "model_url": "https://huggingface.co/mlc-ai/gemma-2b-it-q4f16_1-MLC/resolve/main/",
                    "model_id": "Gemma-2b-it-q4f16_1-MLC",
                    "model_lib_url": "https://raw.githubusercontent.com/mlc-ai/binary-mlc-llm-libs/main/gemma-2b-it/gemma-2b-it-q4f16_1-ctx4k_cs1k-webgpu.wasm",
                },
            ],
        };

        const engineInstance = await window.webllm.CreateMLCEngine(
            "Gemma-2b-it-q4f16_1-MLC",
            { 
                appConfig: appConfig,
                initProgressCallback: (p) => setProgress(Math.round(p.progress * 100)) 
            }
        );
        setEngine(engineInstance);
        setStatus("Babai est éveillé !");
    } catch (e) {
        console.error(e);
        setStatus("Erreur d'initialisation : " + e.message);
    }
};


            const handleChat = async () => {
                if (!engine || !input.trim()) return;
                
                const userMsg = { role: "user", content: input };
                const newHistory = [...chatHistory, userMsg];
                setChatHistory(newHistory);
                setInput('');
                setStatus("Babai réfléchit...");

                try {
                    const reply = await engine.chat.completions.create({ messages: newHistory });
                    const aiMsg = reply.choices[0].message;
                    setChatHistory([...newHistory, aiMsg]);
                    setStatus("Babai est prêt");
                } catch (e) {
                    setStatus("Erreur Chat : " + e.message);
                }
            };

            const pushToGithub = async () => {
                if (!token) {
                    setStatus("Erreur : Token GitHub manquant");
                    return;
                }

                const repo = "snigle/babai";
                const path = "index.html";
                const content = document.documentElement.outerHTML;
                
                setStatus("Synchronisation avec GitHub...");
                try {
                    // 1. Récupérer le SHA actuel
                    const res = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`);
                    const fileData = await res.json();
                    
                    if (!res.ok) throw new Error("Impossible de lire le repo");

                    // 2. Conversion Base64 compatible UTF-8
                    const bytes = new TextEncoder().encode(content);
                    const binString = String.fromCodePoint(...bytes);
                    const base64Content = btoa(binString);

                    // 3. Update
                    const response = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
                        method: 'PUT',
                        headers: {
                            'Authorization': `token ${token}`,
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            message: "Evolution : Babai met à jour son propre code",
                            content: base64Content,
                            sha: fileData.sha
                        })
                    });

                    if (response.ok) setStatus("Évolution réussie ! (Attendez 1min le déploiement)");
                    else {
                        const errorData = await response.json();
                        setStatus("Erreur GitHub : " + errorData.message);
                    }
                } catch (err) {
                    setStatus("Erreur: " + err.message);
                }
            };

            return (
                <div className="p-4 max-w-4xl mx-auto flex flex-col h-screen overflow-hidden">
                    <header className="flex justify-between items-center py-4">
                        <h1 className="text-xl font-bold text-blue-400">Babai OS 👶</h1>
                        <button onClick={pushToGithub} className="text-[10px] bg-slate-800 border border-slate-700 px-3 py-1 rounded-full uppercase tracking-widest hover:bg-blue-900">
                            Push Self-Code
                        </button>
                    </header>

                    <div className="bg-slate-800 p-3 rounded-xl mb-4 border border-slate-700 shadow-2xl">
                        <p className="text-xs font-mono text-green-400 font-bold">> {status}</p>
                        {progress > 0 && progress < 100 && (
                            <div className="w-full bg-slate-900 h-1.5 mt-2 rounded-full overflow-hidden">
                                <div className="bg-blue-500 h-full transition-all duration-300" style={{width: `${progress}%`}}></div>
                            </div>
                        )}
                    </div>

                    {!engine ? (
                        <div className="flex-1 flex items-center justify-center">
                            <button onClick={initAI} className="bg-blue-600 hover:bg-blue-500 text-white px-8 py-4 rounded-2xl font-bold shadow-lg transform active:scale-95 transition-all">
                                ÉVEILLER BABAI
                            </button>
                        </div>
                    ) : (
                        <div className="flex-1 flex flex-col min-h-0">
                            <div className="flex-1 overflow-y-auto mb-4 space-y-4 pr-2 scrollbar-hide">
                                {chatHistory.length === 0 && (
                                    <p className="text-slate-500 text-center mt-10 italic text-sm">Babai attend tes mots...</p>
                                )}
                                {chatHistory.map((m, i) => (
                                    <div key={i} className={`p-4 rounded-2xl max-w-[85%] text-sm ${m.role === 'user' ? 'bg-blue-600 ml-auto' : 'bg-slate-800 border border-slate-700'}`}>
                                        {m.content}
                                    </div>
                                ))}
                            </div>
                            <div className="flex gap-2 p-2 bg-slate-800 rounded-2xl border border-slate-700">
                                <input 
                                    className="flex-1 bg-transparent px-2 outline-none text-sm"
                                    value={input}
                                    onChange={(e) => setInput(e.target.value)}
                                    onKeyPress={(e) => e.key === 'Enter' && handleChat()}
                                    placeholder="Écris ton instruction..."
                                />
                                <button onClick={handleChat} className="bg-blue-600 p-2 rounded-xl text-xs font-bold px-4">SEND</button>
                            </div>
                        </div>
                    )}
                    
                    <div className="mt-4 flex flex-col gap-1">
                        <label className="text-[10px] text-slate-500 uppercase ml-2">GitHub Access Token</label>
                        <input 
                            type="password" 
                            placeholder="ghp_xxxxxxxxxxxx" 
                            value={token}
                            onChange={(e) => {setToken(e.target.value); localStorage.setItem('gh_token', e.target.value)}}
                            className="w-full p-3 bg-slate-950 border border-slate-800 rounded-xl text-xs font-mono focus:border-blue-500 outline-none transition-colors"
                        />
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BabaiApp />);
    </script>
</body>
</html>
