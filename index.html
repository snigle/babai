<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Babai AI - Gemini Edition</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const BabaiApp = () => {
            const [status, setStatus] = useState("Babai prêt");
            const [ghToken, setGhToken] = useState(localStorage.getItem('gh_token') || '');
            const [geminiKey, setGeminiKey] = useState(localStorage.getItem('gemini_key') || '');
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');

            const askGemini = async () => {
                if (!geminiKey) { setStatus("Manque clé Gemini !"); return; }
                setStatus("Babai réfléchit...");
                
                const currentCode = document.documentElement.outerHTML;
                const prompt = `Tu es Babai, une IA auto-évolutive. Ton code actuel est fourni ci-dessous. 
                L'utilisateur dit : "${input}". 
                Si l'utilisateur demande une modification de ton interface ou de tes fonctions, réponds UNIQUEMENT avec le code HTML complet mis à jour. Sinon, réponds normalement.
                --- CODE ACTUEL ---
                ${currentCode}`;

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${geminiKey}`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    
                    const data = await response.json();
                    const reply = data.candidates[0].content.parts[0].text;
                    
                    setMessages([...messages, { role: 'user', text: input }, { role: 'ai', text: reply }]);
                    setInput('');
                    setStatus("Babai a répondu.");

                    // Si la réponse ressemble à du code HTML, on peut imaginer un bouton pour l'appliquer
                    if (reply.includes("<!DOCTYPE html>")) {
                        setStatus("Babai propose une auto-évolution !");
                    }
                } catch (e) {
                    setStatus("Erreur Gemini : " + e.message);
                }
            };

            return (
                <div className="max-w-xl mx-auto h-screen flex flex-col p-4">
                    <header className="flex justify-between items-center border-b border-slate-800 pb-4 mb-4">
                        <h1 className="text-xl font-black text-blue-400">BABAI AI</h1>
                        <span className="text-[10px] bg-slate-800 px-2 py-1 rounded">v1.1.0</span>
                    </header>

                    <div className="flex-1 overflow-y-auto mb-4 space-y-4">
                        {messages.map((m, i) => (
                            <div key={i} className={`p-3 rounded-lg text-sm ${m.role === 'user' ? 'bg-slate-800 ml-8' : 'bg-blue-900/30 border border-blue-800 mr-8'}`}>
                                <pre className="whitespace-pre-wrap font-sans">{m.text}</pre>
                            </div>
                        ))}
                    </div>

                    <div className="bg-slate-900 p-2 rounded-xl mb-4 text-[10px] font-mono text-blue-300 italic">
                        > {status}
                    </div>

                    <div className="flex gap-2 mb-4">
                        <input 
                            className="flex-1 bg-slate-800 p-3 rounded-xl outline-none text-sm" 
                            value={input} 
                            onChange={(e) => setInput(e.target.value)}
                            placeholder="Dis à Babai quoi faire..."
                        />
                        <button onClick={askGemini} className="bg-blue-600 px-6 rounded-xl font-bold uppercase text-xs">Send</button>
                    </div>

                    <div className="grid grid-cols-2 gap-2">
                        <input type="password" placeholder="Gemini Key" value={geminiKey} onChange={(e) => {setGeminiKey(e.target.value); localStorage.setItem('gemini_key', e.target.value)}} className="p-2 bg-black border border-slate-800 rounded text-[10px]" />
                        <input type="password" placeholder="GitHub Token" value={ghToken} onChange={(e) => {setGhToken(e.target.value); localStorage.setItem('gh_token', e.target.value)}} className="p-2 bg-black border border-slate-800 rounded text-[10px]" />
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BabaiApp />);
    </script>
</body>
</html>
