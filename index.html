<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Babai OS - API Edition</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const BabaiApp = () => {
            const [status, setStatus] = useState("Prêt (Mode API)");
            const [ghToken, setGhToken] = useState(localStorage.getItem('gh_token') || '');
            const [aiKey, setAiKey] = useState(localStorage.getItem('ai_key') || '');
            const [chatHistory, setChatHistory] = useState([]);
            const [input, setInput] = useState('');
            const [code, setCode] = useState(document.documentElement.outerHTML);

            const VERSION = "v1.0.6 - API Recovery";

            const callAI = async () => {
                if (!aiKey) { setStatus("Clé API manquante !"); return; }
                setStatus("Babai réfléchit (HuggingFace)...");
                
                try {
                    const response = await fetch("https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct-v0.2", {
                        headers: { Authorization: `Bearer ${aiKey}`, "Content-Type": "application/json" },
                        method: "POST",
                        body: JSON.stringify({ inputs: input }),
                    });
                    const result = await response.json();
                    const aiReply = result[0]?.generated_text || "Erreur de réponse";
                    setChatHistory([...chatHistory, { role: "user", content: input }, { role: "ai", content: aiReply }]);
                    setInput('');
                    setStatus("Babai a répondu");
                } catch (e) { setStatus("Erreur API : " + e.message); }
            };

            const pushToGithub = async () => {
                if (!ghToken) { setStatus("Token GitHub manquant !"); return; }
                setStatus("Sync GitHub...");
                try {
                    const repo = "snigle/babai";
                    const path = "index.html";
                    const res = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`);
                    const fileData = await res.json();
                    
                    const base64 = btoa(unescape(encodeURIComponent(code)));
                    const response = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
                        method: 'PUT',
                        headers: { 'Authorization': `token ${ghToken}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: "Auto-évolution v1.0.6", content: base64, sha: fileData.sha })
                    });
                    setStatus(response.ok ? "Sync OK ! (Reload dans 1min)" : "Erreur Sync");
                } catch (err) { setStatus("Erreur : " + err.message); }
            };

            return (
                <div className="flex flex-col h-screen max-w-xl mx-auto p-4 bg-slate-900 shadow-2xl overflow-hidden">
                    <header className="flex justify-between items-center mb-4">
                        <div>
                            <h1 className="text-2xl font-black text-amber-500 tracking-tighter">BABAI OS</h1>
                            <p className="text-[10px] text-slate-500 font-mono">{VERSION}</p>
                        </div>
                        <button onClick={pushToGithub} className="bg-amber-600 text-[10px] px-3 py-1 rounded-full font-bold uppercase">Sync GitHub</button>
                    </header>

                    <div className="bg-slate-950 p-3 rounded-xl border border-slate-800 mb-4 shadow-lg">
                        <p className="text-xs font-mono text-amber-400 break-words">> {status}</p>
                    </div>

                    <div className="flex-1 overflow-y-auto space-y-4 mb-4 pr-2 text-sm">
                        {chatHistory.map((m, i) => (
                            <div key={i} className={`p-3 rounded-xl ${m.role === 'user' ? 'bg-slate-700 ml-8' : 'bg-amber-900/30 mr-8 border border-amber-900/50'}`}>
                                <strong>{m.role === 'user' ? 'Moi' : 'Babai'}:</strong> {m.content}
                            </div>
                        ))}
                    </div>

                    <div className="space-y-2">
                        <textarea 
                            className="w-full bg-slate-950 p-2 text-[10px] font-mono border border-slate-800 rounded h-24 overflow-auto"
                            value={code}
                            onChange={(e) => setCode(e.target.value)}
                            placeholder="Code source à modifier..."
                        />
                        <div className="flex gap-2">
                            <input className="flex-1 bg-slate-950 p-2 rounded border border-slate-800 text-sm outline-none" value={input} onChange={(e) => setInput(e.target.value)} placeholder="Message..." />
                            <button onClick={callAI} className="bg-amber-600 px-4 rounded font-bold">SEND</button>
                        </div>
                    </div>
                    
                    <div className="mt-4 grid grid-cols-2 gap-2">
                        <input type="password" placeholder="GitHub Token" value={ghToken} onChange={(e) => {setGhToken(e.target.value); localStorage.setItem('gh_token', e.target.value)}} className="p-2 bg-slate-950 border border-slate-800 rounded text-[9px]" />
                        <input type="password" placeholder="HF API Key" value={aiKey} onChange={(e) => {setAiKey(e.target.value); localStorage.setItem('ai_key', e.target.value)}} className="p-2 bg-slate-950 border border-slate-800 rounded text-[9px]" />
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BabaiApp />);
    </script>
</body>
</html>
