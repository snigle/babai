<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Babai OS v1.1.7</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-slate-100 font-sans overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const BabaiApp = () => {
            const [status, setStatus] = useState("Babai en ligne");
            const [token, setToken] = useState(localStorage.getItem('hf_token') || '');
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const endRef = useRef(null);

            useEffect(() => { endRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages]);

            const callMistral = async () => {
                if (!token) return setStatus("TOKEN MANQUANT");
                setStatus("📡 CONNEXION...");
                
                const currentMsg = input;
                const newHistory = [...messages, { role: 'user', text: currentMsg }];
                setMessages(newHistory);
                setInput('');

                try {
                    // Config ultra-robuste conforme doc HF 2026
                    const response = await fetch(
                        "https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct-v0.3",
                        {
                            method: "POST",
                            headers: {
                                "Authorization": `Bearer ${token}`,
                                "Content-Type": "application/json",
                            },
                            body: JSON.stringify({
                                inputs: `[INST] ${currentMsg} [/INST]`,
                                parameters: { max_new_tokens: 250, wait_for_model: true }
                            }),
                        }
                    );

                    if (!response.ok) {
                        const err = await response.json();
                        throw new Error(err.error || "Erreur Serveur");
                    }

                    const data = await response.json();
                    const reply = data[0]?.generated_text || "Pas de réponse";
                    
                    setMessages([...newHistory, { role: 'ai', text: reply.replace(/\[INST\].*?\[\/INST\]/gs, "").trim() }]);
                    setStatus("EN LIGNE");
                } catch (e) {
                    setStatus("❌ BLOCAGE RÉSEAU");
                    setMessages([...newHistory, { role: 'ai', text: "Erreur de connexion. Si tu es sur le Wi-Fi de l'hôpital, passe en 4G. Le pare-feu bloque l'IA." }]);
                }
            };

            return (
                <div className="flex flex-col h-screen bg-slate-950 max-w-md mx-auto border-x border-slate-800">
                    <header className="p-4 border-b border-slate-800 flex justify-between items-center bg-black/50 backdrop-blur">
                        <h1 className="text-xl font-black text-indigo-400 italic tracking-tighter">BABAI OS <span className="text-[10px] text-slate-600 not-italic">v1.1.7</span></h1>
                        <div className="flex gap-1">
                            <div className="w-2 h-2 rounded-full bg-indigo-500 animate-pulse"></div>
                            <div className="w-2 h-2 rounded-full bg-slate-800"></div>
                        </div>
                    </header>

                    <div className="flex-1 overflow-y-auto p-4 space-y-4">
                        {messages.map((m, i) => (
                            <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                <div className={`p-3 rounded-2xl text-sm max-w-[85%] shadow-lg ${
                                    m.role === 'user' ? 'bg-indigo-600 text-white' : 'bg-slate-900 border border-slate-800 text-indigo-100'
                                }`}>
                                    {m.text}
                                </div>
                            </div>
                        ))}
                        <div ref={endRef} />
                    </div>

                    <div className="p-4 bg-black/40 border-t border-slate-900">
                        <div className="text-[10px] font-mono text-indigo-500 mb-2 uppercase font-bold tracking-widest">> {status}</div>
                        <div className="flex gap-2 mb-4 bg-slate-900 p-1 rounded-xl border border-slate-800">
                            <input 
                                className="flex-1 bg-transparent p-2 outline-none text-sm" 
                                value={input} 
                                onChange={(e) => setInput(e.target.value)}
                                onKeyPress={(e) => e.key === 'Enter' && callMistral()}
                                placeholder="Instructions..."
                            />
                            <button onClick={callMistral} className="bg-indigo-600 px-4 py-2 rounded-lg font-bold text-xs">GO</button>
                        </div>
                        <input 
                            type="password" 
                            placeholder="HF Token (hf_...)" 
                            value={token} 
                            onChange={(e) => {setToken(e.target.value); localStorage.setItem('hf_token', e.target.value)}} 
                            className="w-full bg-transparent border-t border-slate-900 pt-2 text-[10px] font-mono text-slate-600 outline-none focus:text-indigo-400" 
                        />
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BabaiApp />);
    </script>
</body>
</html>
