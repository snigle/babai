<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Babai OS v1.1.8</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white font-sans overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const BabaiApp = () => {
            const [status, setStatus] = useState("Babai v1.1.8 Ready");
            const [token, setToken] = useState(localStorage.getItem('hf_token') || '');
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const endRef = useRef(null);

            useEffect(() => { endRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages]);

            const askAI = async () => {
                if (!token) { setStatus("ERREUR : Token requis"); return; }
                if (!input.trim()) return;

                setStatus("Processing...");
                const userMsg = input;
                const newHistory = [...messages, { role: 'user', text: userMsg }];
                setMessages(newHistory);
                setInput('');

                try {
                    const response = await fetch(
                        "https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct-v0.3",
                        {
                            method: "POST",
                            mode: "cors",
                            headers: {
                                "Authorization": `Bearer ${token.trim()}`,
                                "Content-Type": "application/json",
                            },
                            body: JSON.stringify({
                                inputs: userMsg,
                                options: { wait_for_model: true }
                            }),
                        }
                    );

                    const data = await response.json();

                    if (!response.ok) {
                        throw new Error(data.error || `Erreur ${response.status}`);
                    }

                    // Format de sortie HF : [{generated_text: "..."}]
                    const reply = Array.isArray(data) ? data[0].generated_text : data.generated_text;
                    
                    setMessages([...newHistory, { role: 'ai', text: reply || "Aucune réponse générée." }]);
                    setStatus("Online");
                } catch (e) {
                    setStatus("API ERROR: " + e.message);
                    console.error("Fetch error details:", e);
                }
            };

            return (
                <div className="flex flex-col h-screen max-w-md mx-auto bg-slate-950 border-x border-slate-800 shadow-2xl">
                    <header className="p-4 border-b border-slate-800 flex justify-between items-center bg-slate-900/50">
                        <h1 className="text-xl font-black text-indigo-500 tracking-tighter italic">BABAI OS</h1>
                        <span className="text-[10px] text-slate-500 font-mono">v1.1.8</span>
                    </header>

                    <div className="flex-1 overflow-y-auto p-4 space-y-4">
                        {messages.length === 0 && (
                            <p className="text-center text-slate-600 text-xs mt-10 italic leading-relaxed">
                                "Le code est le message." <br/>
                                Prêt pour l'instruction.
                            </p>
                        )}
                        {messages.map((m, i) => (
                            <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                <div className={`p-3 rounded-2xl text-sm max-w-[85%] ${
                                    m.role === 'user' ? 'bg-indigo-600 text-white rounded-tr-none' : 'bg-slate-800 text-indigo-100 rounded-tl-none border border-slate-700'
                                } shadow-md`}>
                                    {m.text}
                                </div>
                            </div>
                        ))}
                        <div ref={endRef} />
                    </div>

                    <div className="p-4 bg-slate-900/80 border-t border-slate-800">
                        <div className="text-[9px] font-mono text-indigo-400 mb-2 font-bold uppercase tracking-widest italic">> {status}</div>
                        <div className="flex gap-2 mb-4 bg-black/40 p-1.5 rounded-xl border border-slate-800">
                            <input 
                                className="flex-1 bg-transparent p-2 outline-none text-sm placeholder-slate-700" 
                                value={input} 
                                onChange={(e) => setInput(e.target.value)}
                                onKeyPress={(e) => e.key === 'Enter' && askAI()}
                                placeholder="Entrer commande..."
                            />
                            <button onClick={askAI} className="bg-indigo-600 hover:bg-indigo-500 px-5 rounded-lg font-black text-[10px] text-white uppercase italic transition-all">Send</button>
                        </div>
                        <input 
                            type="password" 
                            placeholder="HF_TOKEN" 
                            value={token} 
                            onChange={(e) => {setToken(e.target.value); localStorage.setItem('hf_token', e.target.value)}} 
                            className="w-full bg-transparent text-[10px] font-mono text-slate-600 outline-none text-center" 
                        />
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BabaiApp />);
    </script>
</body>
</html>
